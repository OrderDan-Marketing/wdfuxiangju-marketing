<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>馥湘居 × 網站策略訪談</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3ED;
    --card:#FDFBF7;
    --ink:#2A2620;
    --ink-soft:#6B6558;
    --tea:#55684A;
    --tea-deep:#3E4E37;
    --clay:#9C7A52;
    --line:#E1D8C4;
    --gold:#B4903F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    background:
      radial-gradient(circle at 15% 8%, rgba(180,144,63,0.06), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(85,104,74,0.07), transparent 45%),
      var(--paper);
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:20px 14px 48px;
  }

  .stage{
    width:100%;
    max-width:640px;
    margin:0 auto;
  }

  /* header */
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
    padding:0 2px;
  }
  .brandbar .mark{
    font-family:'Noto Serif TC', serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.12em;
    color:var(--tea-deep);
  }
  .brandbar .mark span{
    color:var(--ink-soft);
    font-weight:400;
    font-size:12px;
    letter-spacing:0.08em;
  }

  /* progress: tea cups filling */
  .cups{ display:flex; gap:7px; }
  .cup{
    width:20px; height:20px;
    border-radius:0 0 7px 7px;
    border:1.4px solid var(--clay);
    position:relative;
    overflow:hidden;
    flex:none;
  }
  .cup::after{
    content:'';
    position:absolute;
    left:0; right:0; bottom:0;
    height:0%;
    background:linear-gradient(180deg, var(--gold), var(--tea));
    transition:height .4s ease;
  }
  .cup.filled::after{ height:100%; }
  .cup.current{ border-color:var(--gold); }

  /* card */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:3px;
    padding:34px 30px 26px;
    position:relative;
    box-shadow:0 1px 2px rgba(42,38,32,0.03), 0 12px 32px rgba(42,38,32,0.05);
  }
  .card::before{
    content:'';
    position:absolute;
    top:0; left:30px; right:30px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:.5;
  }

  .step-label{
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--clay);
    text-transform:uppercase;
    margin-bottom:14px;
    font-weight:500;
  }

  .question{
    font-family:'Noto Serif TC', serif;
    font-weight:600;
    font-size:20px;
    line-height:1.55;
    margin-bottom:18px;
  }

  /* why box */
  .why{
    border-left:2px solid var(--gold);
    padding:10px 14px;
    margin-bottom:22px;
    background:rgba(180,144,63,0.05);
  }
  .why .why-label{
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--tea-deep);
    font-weight:600;
    margin-bottom:4px;
  }
  .why .why-text{
    font-size:13.5px;
    line-height:1.75;
    color:var(--ink-soft);
  }

  .field{ margin-bottom:22px; }

  .options{ display:flex; flex-direction:column; gap:9px; }
  .opt{
    border:1px solid var(--line);
    background:#fff;
    border-radius:3px;
    padding:14px 15px;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    -webkit-tap-highlight-color:rgba(85,104,74,.15);
    transition:border-color .15s, background .15s;
    user-select:none;
  }
  .opt:hover{ border-color:var(--clay); }
  .opt .dot{
    width:15px; height:15px;
    border-radius:50%;
    border:1.4px solid var(--clay);
    flex:none;
    position:relative;
  }
  .opt.selected{
    border-color:var(--tea);
    background:rgba(85,104,74,0.08);
  }
  .opt.selected .dot{ border-color:var(--tea); }
  .opt.selected .dot::after{
    content:'';
    position:absolute;
    inset:3px;
    border-radius:50%;
    background:var(--tea);
  }

  textarea{
    width:100%;
    min-height:110px;
    border:1px solid var(--line);
    border-radius:3px;
    padding:13px 14px;
    font-family:'Noto Sans TC', sans-serif;
    font-size:15px;
    line-height:1.7;
    color:var(--ink);
    background:#fff;
    resize:vertical;
  }
  textarea:focus, .opt:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:1px;
  }
  textarea::placeholder{ color:#B7B0A0; }

  .optional-tag{
    display:inline-block;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }

  .nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding-top:4px;
  }
  .nav button{
    font-family:'Noto Sans TC', sans-serif;
    font-size:14px;
    border:none;
    background:none;
    cursor:pointer;
    padding:12px 8px;
    min-height:44px;
  }
  .btn-back{ color:var(--ink-soft); }
  .btn-back.hidden{ visibility:hidden; }
  .btn-next{
    color:#fff;
    background:var(--tea-deep);
    padding:12px 28px;
    border-radius:3px;
  }
  .btn-next:hover{ background:var(--tea); }
  .btn-next:disabled{ opacity:.35; cursor:not-allowed; }

  .hint{
    font-size:12px;
    color:var(--clay);
    margin-top:8px;
    min-height:16px;
  }

  /* review screen */
  .review-item{ padding:14px 0; border-bottom:1px solid var(--line); }
  .review-item:last-child{ border-bottom:none; }
  .review-q{ font-size:12px; color:var(--clay); margin-bottom:4px; }
  .review-a{ font-size:14.5px; line-height:1.6; white-space:pre-wrap; }
  .review-a.empty{ color:#B7B0A0; font-style:italic; }

  .review-actions{ display:flex; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .btn-copy{
    background:var(--tea-deep); color:#fff; border:none;
    padding:13px 22px; border-radius:3px; font-size:14px; cursor:pointer;
    min-height:44px;
  }
  .btn-copy:hover{ background:var(--tea); }
  .btn-restart{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    padding:13px 22px; border-radius:3px; font-size:14px; cursor:pointer;
    min-height:44px;
  }
  .copied-msg{ font-size:12.5px; color:var(--tea-deep); margin-top:10px; min-height:16px; }

  .intro-title{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:23px;
    line-height:1.5;
    margin-bottom:14px;
  }
  .intro-body{
    font-size:14.5px;
    line-height:1.85;
    color:var(--ink-soft);
    margin-bottom:26px;
  }

  @media (max-width:480px){
    body{ padding:14px 10px 40px; }
    .card{ padding:26px 18px 20px; }
    .card::before{ left:18px; right:18px; }
    .question{ font-size:18px; }
    .intro-title{ font-size:20px; }
    .cups{ width:100%; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="brandbar">
    <div class="mark">馥湘居 <span>× 網站策略訪談</span></div>
    <div class="cups" id="cups"></div>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
var questions = [
  { type: 'intro' },
  {
    step: '定位 01',
    q: '目前這個網站，您希望對外主要傳達的是？',
    why: '網站現在的文案偏向「茶室意境、品茗心境」，但我們了解到實際成交多半是大宗普洱茶批發。方向不同，接下來的網站架構跟 SEO 關鍵字策略會完全不一樣，這是所有調整的起點。',
    type: 'single',
    options: ['茶室體驗／高端會員招募','普洱茶批發／原料供應','兩者都要，但比重不同','尚未確定，需要協助釐清']
  },
  {
    step: '定位 02',
    q: '若兩者都要經營，網站上是否需要把「批發洽談」與「會員體驗」分開呈現？',
    why: '批發採購方在意的是供應能力、規格、產能；品茗會員在意的是氛圍與體驗。兩種內容混在一起，容易讓兩邊訪客都找不到自己要的重點。',
    type: 'single',
    options: ['需要，各自獨立頁面／動線','不用，同一套內容呈現即可','希望聽聽建議']
  },
  {
    step: '產品 01',
    q: '目前普洱茶品項大致情形——共有幾款？年份、產地、規格（克重）大致如何？',
    why: '網站目前完全沒有品項資訊，但同業電商站至少都會列出完整品項頁。這些資料越具體，之後的品項頁跟 SEO 文章才寫得出說服力，而不是空泛的形容詞。',
    type: 'text',
    placeholder: '例如：目前約有 5 款茶餅，年份從 2015～2023，多為 357g／400g 規格，主要產地為...'
  },
  {
    step: '產品 02',
    q: '是否有可對外公開的溯源證明、產地認證、獲獎紀錄，或曾配合過的品牌／通路（不方便透露名稱也可用類型描述）？',
    why: 'B2B 高單價採購最看重的是信任背書。這類「實績佐證」，同業電商站普遍寫得很表面，如果您有實際資料，會是能做出差異化的地方。',
    type: 'text',
    placeholder: '例如：與 OO 連鎖飲料品牌長期配合、取得 OO 產地認證、曾獲 OO 獎項...',
    optional: true
  },
  {
    step: '客群 01',
    q: '目前客戶主要是怎麼找到您、怎麼成交的？',
    why: '若多數成交靠既有關係維繫，SEO 的急迫性跟投資報酬會不一樣；若陌生開發比重高，代表網站找不找得到、看不看得懂、留不留得住資訊，會直接影響成交轉換。',
    type: 'single',
    options: ['靠熟人介紹／既有關係維繫','客戶主動上網搜尋找到我們','業務主動開發陌生客戶','以上皆有']
  },
  {
    step: '客群 02',
    q: '客戶在成交前，是否會實地拜訪您的茶室或倉儲空間？',
    why: '這會直接決定「地圖 SEO」這個方案值不值得投入——如果客戶不會實地到訪，地圖 SEO 的資源報酬率會很低，預算應該轉往其他 SEO 主題。',
    type: 'single',
    options: ['會，多數客戶會現場看貨／喝茶','不會，多半線上或電話完成','兩種情況都有']
  },
  {
    step: '轉換路徑',
    q: '目前有沒有讓客戶「詢價」或「留下聯絡方式」的固定管道？',
    why: '目前網站上沒有任何詢價入口。就算 SEO 把流量帶進來，網站也留不住、轉不了單。這是網站結構調整裡最優先要補上的缺口。',
    type: 'single',
    options: ['有，但不在網站上（例如 LINE／電話）','完全沒有固定管道','網站上已經有表單']
  },
  {
    step: '成效目標',
    q: '接下來 3～6 個月，您最希望看到哪個具體改變？',
    why: '這會決定 SEO 文章要優先寫哪個主題、以及用什麼指標衡量成效，避免文章寫了一堆，方向卻跟您真正想要的結果對不上。',
    type: 'single',
    options: ['詢價／聯絡次數增加','品牌被更多同業、採購方認識','特定關鍵字（如「普洱茶批發」）排名提升','還沒想清楚，希望先討論']
  },
  {
    step: '執行節奏',
    q: '執行時程與預算，您傾向哪一種做法？',
    why: '幫助排定專案的優先順序，以及報價方案怎麼切分執行，避免討論時間都花在細節上，卻沒先對齊「要先做什麼」。',
    type: 'single',
    options: ['先做一次性網站結構調整，SEO 後續再談','網站調整與 SEO 文章同時啟動','想先了解 24 萬／30 萬方案差異再決定']
  },
  { type: 'review' }
];

var current = 0;
var answers = new Array(questions.length).fill(null);
var cardEl = document.getElementById('card');
var cupsEl = document.getElementById('cups');

function renderCups(){
  var html = '';
  var total = questions.length - 2;
  for(var i=0;i<total;i++){
    var cls = 'cup';
    if(i < current - 1 || current === questions.length - 1) cls += ' filled';
    if(i === current - 1) cls += ' current';
    html += '<div class="'+cls+'"></div>';
  }
  cupsEl.innerHTML = html;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  renderCups();
  var item = questions[current];
  var html = '';

  if(item.type === 'intro'){
    html =
      '<div class="intro-title">在動筆之前，想先了解幾件事</div>' +
      '<div class="intro-body">以下是根據目前網站與 SEO 討論整理出來的九個問題。每一題都會說明「為什麼問這題」——這些回答會直接決定網站架構調整的優先順序，以及 SEO 文章要圍繞哪些主題撰寫。大約需要 5 分鐘，可以先想想再回答，不用急。</div>' +
      '<div class="nav"><span></span><button type="button" class="btn-next" data-action="next">開始 →</button></div>';

  } else if(item.type === 'review'){
    html = '<div class="step-label">回顧</div>' +
      '<div class="question" style="margin-bottom:6px;">您的回答整理</div>' +
      '<div style="font-size:13px;color:var(--ink-soft);margin-bottom:18px;">確認無誤後，可複製整段文字傳給我們，或直接截圖。</div>';
    for(var i=1;i<questions.length-1;i++){
      var q = questions[i];
      var a = answers[i];
      var has = a && String(a).trim() !== '';
      html += '<div class="review-item">' +
        '<div class="review-q">'+q.step+'｜'+q.q+'</div>' +
        '<div class="review-a'+(has?'':' empty')+'">'+(has?escapeHtml(a):'（未填寫）')+'</div>' +
        '</div>';
    }
    html += '<div class="review-actions">' +
      '<button type="button" class="btn-copy" data-action="copy">複製為文字</button>' +
      '<button type="button" class="btn-restart" data-action="restart">重新填寫</button>' +
      '</div><div class="copied-msg" id="copiedMsg"></div>' +
      '<div class="nav"><button type="button" class="btn-back" data-action="back">← 上一步</button><span></span></div>';

  } else {
    var fieldHtml = '';
    if(item.type === 'single'){
      fieldHtml = '<div class="options">';
      for(var j=0;j<item.options.length;j++){
        var sel = answers[current] === item.options[j] ? ' selected' : '';
        fieldHtml += '<div class="opt'+sel+'" data-opt="'+j+'" tabindex="0" role="button">' +
          '<span class="dot"></span><span>'+item.options[j]+'</span></div>';
      }
      fieldHtml += '</div><div class="hint" id="hint">'+(answers[current]?'':'點選一個選項即前往下一題')+'</div>';
    } else {
      fieldHtml = (item.optional ? '<div class="optional-tag">此題可略過，直接按「下一步」</div>' : '') +
        '<textarea id="ta" placeholder="'+(item.placeholder||'請輸入...')+'">'+(answers[current]||'')+'</textarea>';
    }

    html =
      '<div class="step-label">'+item.step+'</div>' +
      '<div class="question">'+item.q+'</div>' +
      '<div class="why"><div class="why-label">為什麼問這題</div><div class="why-text">'+item.why+'</div></div>' +
      '<div class="field">'+fieldHtml+'</div>' +
      '<div class="nav">' +
        '<button type="button" class="btn-back'+(current<=1?' hidden':'')+'" data-action="back">← 上一步</button>' +
        '<button type="button" class="btn-next" data-action="next"'+(item.type==='single' && !answers[current] ? ' disabled':'')+'>下一步 →</button>' +
      '</div>';
  }

  cardEl.innerHTML = html;
  window.scrollTo(0,0);
}

/* 事件委派：不論內容如何重繪，按鈕永遠有效 */
cardEl.addEventListener('click', function(e){
  var opt = e.target.closest('.opt');
  if(opt){
    var item = questions[current];
    answers[current] = item.options[parseInt(opt.dataset.opt,10)];
    /* 標記選取後自動前往下一題 */
    render();
    setTimeout(function(){ go(1); }, 250);
    return;
  }
  var btn = e.target.closest('button[data-action]');
  if(!btn) return;
  var action = btn.dataset.action;
  if(action === 'next') go(1);
  else if(action === 'back') go(-1);
  else if(action === 'restart'){ answers = new Array(questions.length).fill(null); current = 0; render(); }
  else if(action === 'copy') copySummary();
});

cardEl.addEventListener('keydown', function(e){
  var opt = e.target.closest ? e.target.closest('.opt') : null;
  if(opt && (e.key === 'Enter' || e.key === ' ')){
    e.preventDefault();
    opt.click();
  }
});

cardEl.addEventListener('input', function(e){
  if(e.target && e.target.id === 'ta'){
    answers[current] = e.target.value;
  }
});

function go(dir){
  current += dir;
  if(current < 0) current = 0;
  if(current > questions.length - 1) current = questions.length - 1;
  render();
}

function copySummary(){
  var text = '馥湘居｜網站策略訪談 回覆整理\n────────────────\n\n';
  for(var i=1;i<questions.length-1;i++){
    var q = questions[i];
    var a = answers[i] && String(answers[i]).trim() !== '' ? answers[i] : '（未填寫）';
    text += '【'+q.step+'】'+q.q+'\n→ '+a+'\n\n';
  }
  var msg = document.getElementById('copiedMsg');
  function ok(){ if(msg){ msg.textContent = '已複製到剪貼簿'; setTimeout(function(){ if(msg) msg.textContent=''; }, 2500);} }
  function fallback(){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); ok(); }
    catch(err){ if(msg) msg.textContent = '複製失敗，請截圖此頁'; }
    document.body.removeChild(ta);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(fallback);
  } else {
    fallback();
  }
}

render();
</script>
</body>
</html>
