<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>馥湘居 × 網站策略訪談</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3ED;
    --card:#FDFBF7;
    --ink:#2A2620;
    --ink-soft:#6B6558;
    --tea:#55684A;
    --tea-deep:#3E4E37;
    --clay:#9C7A52;
    --line:#E1D8C4;
    --gold:#B4903F;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
  body{
    background:
      radial-gradient(circle at 12% 5%, rgba(180,144,63,0.07), transparent 42%),
      radial-gradient(circle at 88% 95%, rgba(85,104,74,0.08), transparent 45%),
      var(--paper);
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }

  /* ============ 版面：桌機雙欄滿版 ============ */
  .wrap{
    max-width:1240px;
    margin:0 auto;
    padding:48px 40px 80px;
    display:grid;
    grid-template-columns:300px 1fr;
    gap:56px;
    align-items:start;
  }

  /* ---- 左側固定導覽 ---- */
  .side{
    position:sticky;
    top:48px;
  }
  .side .mark{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.14em;
    color:var(--tea-deep);
    margin-bottom:4px;
  }
  .side .sub{
    font-size:13px;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .side .lede{
    font-size:13.5px;
    line-height:1.9;
    color:var(--ink-soft);
    border-top:1px solid var(--line);
    padding-top:18px;
    margin-bottom:26px;
  }

  .toc{ list-style:none; }
  .toc li{ margin-bottom:2px; }
  .toc a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    font-size:13.5px;
    color:var(--ink-soft);
    text-decoration:none;
    border-radius:3px;
    border-left:2px solid transparent;
  }
  .toc a:hover{ color:var(--ink); background:rgba(180,144,63,0.06); }
  .toc a.active{
    color:var(--tea-deep);
    border-left-color:var(--gold);
    background:rgba(85,104,74,0.06);
    font-weight:500;
  }
  .toc .tick{
    width:14px; height:14px;
    border-radius:50%;
    border:1.4px solid var(--clay);
    flex:none;
    position:relative;
  }
  .toc a.done .tick{ border-color:var(--tea); background:var(--tea); }
  .toc a.done .tick::after{
    content:'';
    position:absolute; left:4px; top:1.5px;
    width:3px; height:7px;
    border:solid #fff; border-width:0 1.6px 1.6px 0;
    transform:rotate(45deg);
  }

  .side .count{
    margin-top:22px;
    font-size:12.5px;
    color:var(--clay);
    letter-spacing:0.06em;
  }

  /* ---- 右側主內容 ---- */
  .main{ min-width:0; }

  .qcard{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:3px;
    padding:34px 38px 30px;
    margin-bottom:26px;
    position:relative;
    box-shadow:0 1px 2px rgba(42,38,32,0.03), 0 10px 28px rgba(42,38,32,0.04);
    scroll-margin-top:32px;
  }
  .qcard::before{
    content:'';
    position:absolute; top:0; left:38px; right:38px; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:.5;
  }

  .step-label{
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--clay);
    text-transform:uppercase;
    margin-bottom:12px;
    font-weight:500;
  }
  .question{
    font-family:'Noto Serif TC', serif;
    font-weight:600;
    font-size:21px;
    line-height:1.55;
    margin-bottom:16px;
  }
  .why{
    border-left:2px solid var(--gold);
    padding:10px 16px;
    margin-bottom:22px;
    background:rgba(180,144,63,0.05);
  }
  .why-label{
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--tea-deep);
    font-weight:600;
    margin-bottom:4px;
  }
  .why-text{
    font-size:13.5px;
    line-height:1.8;
    color:var(--ink-soft);
  }

  /* 選項：桌機兩欄吃寬度 */
  .options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .opt{
    border:1px solid var(--line);
    background:#fff;
    border-radius:3px;
    padding:14px 15px;
    font-size:14.5px;
    line-height:1.5;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    -webkit-tap-highlight-color:rgba(85,104,74,.15);
    user-select:none;
    transition:border-color .15s, background .15s;
  }
  .opt:hover{ border-color:var(--clay); }
  .opt .dot{
    width:15px; height:15px;
    border-radius:50%;
    border:1.4px solid var(--clay);
    flex:none;
    position:relative;
  }
  .opt.selected{ border-color:var(--tea); background:rgba(85,104,74,0.08); }
  .opt.selected .dot{ border-color:var(--tea); }
  .opt.selected .dot::after{
    content:'';
    position:absolute; inset:3px;
    border-radius:50%;
    background:var(--tea);
  }
  .opt:focus-visible{ outline:2px solid var(--gold); outline-offset:1px; }

  textarea{
    width:100%;
    min-height:110px;
    border:1px solid var(--line);
    border-radius:3px;
    padding:13px 15px;
    font-family:'Noto Sans TC', sans-serif;
    font-size:14.5px;
    line-height:1.7;
    color:var(--ink);
    background:#fff;
    resize:vertical;
  }
  textarea:focus{ outline:2px solid var(--gold); outline-offset:1px; }
  textarea::placeholder{ color:#B7B0A0; }
  .optional-tag{
    display:inline-block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:10px;
  }

  /* ============ 手機版：單欄 ============ */
  @media (max-width:960px){
    .wrap{
      grid-template-columns:1fr;
      gap:0;
      padding:24px 16px 60px;
    }
    .side{
      position:static;
      margin-bottom:22px;
    }
    .side .mark{ font-size:22px; }
    .toc{ display:none; }
    .side .count{ margin-top:12px; }
    .qcard{ padding:24px 20px 22px; }
    .qcard::before{ left:20px; right:20px; }
    .question{ font-size:18.5px; }
    .options{ grid-template-columns:1fr; }
    .finale{ padding:28px 22px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- 左側：品牌 + 導覽 -->
  <aside class="side">
    <div class="mark">馥湘居</div>
    <div class="sub">網站策略訪談</div>
    <div class="lede">
      以下八個問題，每一題都說明「為什麼問」。您的回答會直接決定網站架構調整的優先順序，以及 SEO 文章圍繞的主題。全部填完約 5 分鐘，往下捲動即可逐題作答。
    </div>
    <ul class="toc" id="toc"></ul>
    <div class="count" id="countLabel">已完成 0 / 9 題</div>
  </aside>

  <!-- 右側：所有題目 -->
  <main class="main" id="main"></main>

</div>

<script>
var questions = [
  {
    id:'q1', step:'定位 01',
    q:'目前這個網站，您希望對外主要傳達的是？',
    why:'網站現在的文案偏向「茶室意境、品茗心境」，但我們了解到實際成交多半是大宗普洱茶批發。方向不同，接下來的網站架構跟 SEO 關鍵字策略會完全不一樣，這是所有調整的起點。',
    type:'single',
    options:['茶室體驗／高端會員招募','普洱茶批發／原料供應','兩者都要，但比重不同','尚未確定，需要協助釐清']
  },
  {
    id:'q2', step:'定位 02',
    q:'若兩者都要經營，網站上是否需要把「批發洽談」與「會員體驗」分開呈現？',
    why:'批發採購方在意的是供應能力、規格、產能；品茗會員在意的是氛圍與體驗。兩種內容混在一起，容易讓兩邊訪客都找不到自己要的重點。',
    type:'single',
    options:['需要，各自獨立頁面／動線','不用，同一套內容呈現即可','希望聽聽建議']
  },
  {
    id:'q3', step:'產品 01',
    q:'目前普洱茶品項大致情形——共有幾款？年份、產地、規格（克重）大致如何？',
    why:'網站目前完全沒有品項資訊，但同業電商站至少都會列出完整品項頁。這些資料越具體，之後的品項頁跟 SEO 文章才寫得出說服力，而不是空泛的形容詞。',
    type:'text',
    placeholder:'例如：目前約有 5 款茶餅，年份從 2015～2023，多為 357g／400g 規格，主要產地為...'
  },
  {
    id:'q4', step:'產品 02',
    q:'是否有可對外公開的溯源證明、產地認證、獲獎紀錄，或曾配合過的品牌／通路？',
    why:'B2B 高單價採購最看重的是信任背書。這類「實績佐證」，同業電商站普遍寫得很表面，如果您有實際資料，會是能做出差異化的地方。不方便透露名稱也可用類型描述。',
    type:'text',
    placeholder:'例如：與 OO 連鎖飲料品牌長期配合、取得 OO 產地認證、曾獲 OO 獎項...',
    optional:true
  },
  {
    id:'q5', step:'客群 01',
    q:'目前客戶主要是怎麼找到您、怎麼成交的？',
    why:'若多數成交靠既有關係維繫，SEO 的急迫性跟投資報酬會不一樣；若陌生開發比重高，代表網站找不找得到、看不看得懂、留不留得住資訊，會直接影響成交轉換。',
    type:'single',
    options:['靠熟人介紹／既有關係維繫','客戶主動上網搜尋找到我們','業務主動開發陌生客戶','以上皆有']
  },
  {
    id:'q6', step:'客群 02',
    q:'客戶在成交前，是否會實地拜訪您的茶室或倉儲空間？',
    why:'這會直接決定「地圖 SEO」這個方案值不值得投入——如果客戶不會實地到訪，地圖 SEO 的資源報酬率會很低，預算應該轉往其他 SEO 主題。',
    type:'single',
    options:['會，多數客戶會現場看貨／喝茶','不會，多半線上或電話完成','兩種情況都有']
  },
  {
    id:'q7', step:'轉換路徑',
    q:'目前有沒有讓客戶「詢價」或「留下聯絡方式」的固定管道？',
    why:'目前網站上沒有任何詢價入口。就算 SEO 把流量帶進來，網站也留不住、轉不了單。這是網站結構調整裡最優先要補上的缺口。',
    type:'single',
    options:['有，但不在網站上（例如 LINE／電話）','完全沒有固定管道','網站上已經有表單']
  },
  {
    id:'q8', step:'成效目標',
    q:'接下來 3～6 個月，您最希望看到哪個具體改變？',
    why:'這會決定 SEO 文章要優先寫哪個主題、以及用什麼指標衡量成效，避免文章寫了一堆，方向卻跟您真正想要的結果對不上。',
    type:'single',
    options:['詢價／聯絡次數增加','品牌被更多同業、採購方認識','特定關鍵字（如「普洱茶批發」）排名提升','還沒想清楚，希望先討論']
  }
];

var answers = {};
var mainEl = document.getElementById('main');
var tocEl = document.getElementById('toc');
var countEl = document.getElementById('countLabel');

function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ---- 一次性建構整頁 ---- */
function build(){
  var html = '';
  for(var i=0;i<questions.length;i++){
    var q = questions[i];
    var field = '';
    if(q.type === 'single'){
      field = '<div class="options">';
      for(var j=0;j<q.options.length;j++){
        field += '<div class="opt" data-q="'+q.id+'" data-opt="'+j+'" tabindex="0" role="button">'+
                 '<span class="dot"></span><span>'+q.options[j]+'</span></div>';
      }
      field += '</div>';
    } else {
      field = (q.optional ? '<div class="optional-tag">此題可略過</div>' : '') +
              '<textarea data-q="'+q.id+'" placeholder="'+escapeAttr(q.placeholder||'請輸入...')+'"></textarea>';
    }
    html += '<section class="qcard" id="'+q.id+'">' +
      '<div class="step-label">'+q.step+'</div>' +
      '<div class="question">'+q.q+'</div>' +
      '<div class="why"><div class="why-label">為什麼問這題</div><div class="why-text">'+q.why+'</div></div>' +
      field +
      '</section>';
  }
  mainEl.innerHTML = html;

  /* 左側導覽 */
  var toc = '';
  for(var k=0;k<questions.length;k++){
    toc += '<li><a href="#'+questions[k].id+'" data-toc="'+questions[k].id+'">'+
           '<span class="tick"></span><span>'+questions[k].step+'</span></a></li>';
  }
  tocEl.innerHTML = toc;
}

/* ---- 事件委派 ---- */
mainEl.addEventListener('click', function(e){
  var opt = e.target.closest('.opt');
  if(opt){
    var qid = opt.dataset.q;
    var q = questions.find(function(x){ return x.id === qid; });
    answers[qid] = q.options[parseInt(opt.dataset.opt,10)];
    var group = mainEl.querySelectorAll('.opt[data-q="'+qid+'"]');
    for(var i=0;i<group.length;i++){ group[i].classList.remove('selected'); }
    opt.classList.add('selected');
    updateProgress();
    /* 自動滾到下一題 */
    var section = opt.closest('section');
    var next = section && section.nextElementSibling;
    if(next){ setTimeout(function(){ next.scrollIntoView({behavior:'smooth', block:'start'}); }, 220); }
    return;
  }
});

mainEl.addEventListener('keydown', function(e){
  var opt = e.target.closest ? e.target.closest('.opt') : null;
  if(opt && (e.key === 'Enter' || e.key === ' ')){ e.preventDefault(); opt.click(); }
});

mainEl.addEventListener('input', function(e){
  if(e.target.tagName === 'TEXTAREA'){
    var v = e.target.value.trim();
    if(v){ answers[e.target.dataset.q] = e.target.value; }
    else { delete answers[e.target.dataset.q]; }
    updateProgress();
  }
});

/* ---- 進度與導覽狀態 ---- */
function updateProgress(){
  var done = Object.keys(answers).length;
  var label = '已完成 '+done+' / '+questions.length+' 題';
  countEl.textContent = label;
  var links = tocEl.querySelectorAll('a[data-toc]');
  for(var i=0;i<links.length;i++){
    var id = links[i].dataset.toc;
    if(answers[id]) links[i].classList.add('done');
    else links[i].classList.remove('done');
  }
}

/* 捲動時高亮目前題目 */
var observer = new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){
      var id = entry.target.id;
      var links = tocEl.querySelectorAll('a[data-toc]');
      for(var i=0;i<links.length;i++){
        links[i].classList.toggle('active', links[i].dataset.toc === id);
      }
    }
  });
}, { rootMargin:'-30% 0px -60% 0px' });

build();
updateProgress();
var sections = document.querySelectorAll('.qcard');
for(var s=0;s<sections.length;s++){ observer.observe(sections[s]); }
</script>
</body>
</html>
